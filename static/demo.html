<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Ferry — Demo</title>
<style>
  :root {
    --bg:#ffffff; --fg:#09090b; --muted:#71717a; --border:#e4e4e7;
    --subtle:#f4f4f5; --subtle-2:#fafafa; --ring:#18181b;
  }
  * { box-sizing:border-box; }
  html,body { height:100%; }
  body {
    margin:0; background:var(--bg); color:var(--fg);
    font:14px/1.55 ui-sans-serif,system-ui,-apple-system,"Segoe UI",Roboto,Inter,sans-serif;
    -webkit-font-smoothing:antialiased;
  }
  a { color:inherit; }
  .wrap { max-width:1080px; margin:0 auto; padding:20px 20px 56px; }

  /* Header */
  header { display:flex; align-items:center; gap:12px; padding:6px 0 18px; }
  .brand { display:flex; align-items:center; gap:10px; font-weight:650; letter-spacing:-.01em; font-size:17px; }
  .brand .mark { width:26px; height:26px; border:1px solid var(--fg); border-radius:8px;
    display:grid; place-items:center; font-size:14px; }
  .brand .sub { color:var(--muted); font-weight:450; font-size:12.5px; }
  .spacer { flex:1; }

  /* Switch */
  .conn { display:flex; align-items:center; gap:10px; }
  .conn .lbl { font-size:12.5px; color:var(--muted); min-width:46px; text-align:right; }
  .switch { --w:46px; --h:26px; position:relative; width:var(--w); height:var(--h);
    border:1px solid var(--border); border-radius:999px; background:var(--subtle); cursor:pointer; transition:.18s; }
  .switch[data-on="true"] { background:var(--fg); border-color:var(--fg); }
  .switch .knob { position:absolute; top:2px; left:2px; width:20px; height:20px; border-radius:999px;
    background:#fff; box-shadow:0 1px 2px rgba(0,0,0,.18); transition:.18s; }
  .switch[data-on="true"] .knob { left:22px; }

  /* How-it-works banner */
  .banner { display:flex; align-items:center; gap:14px; border:1px solid var(--border); border-radius:14px;
    padding:12px 16px; margin-bottom:18px; background:var(--subtle-2); }
  .flow { display:flex; align-items:center; gap:10px; flex:1; flex-wrap:wrap; font-size:12.5px; color:var(--muted); }
  .chip { border:1px solid var(--border); background:#fff; border-radius:999px; padding:3px 10px; color:var(--fg); font-weight:500; }
  .arrow { position:relative; width:30px; height:2px; background:var(--border); border-radius:2px; }
  .arrow::after { content:""; position:absolute; left:0; top:-2px; width:6px; height:6px; border-radius:999px; background:var(--fg);
    animation:slide 2.4s linear infinite; }
  @keyframes slide { from{transform:translateX(0);opacity:0} 10%{opacity:1} 90%{opacity:1} to{transform:translateX(24px);opacity:0} }
  .banner .how { font-size:12.5px; font-weight:550; white-space:nowrap; text-decoration:none;
    border:1px solid var(--border); padding:6px 12px; border-radius:8px; background:#fff; }
  .banner .how:hover { background:var(--subtle); }

  /* Grid */
  .grid { display:grid; grid-template-columns:1.5fr 1fr; gap:18px; }
  @media (max-width:820px){ .grid{ grid-template-columns:1fr; } }
  .card { border:1px solid var(--border); border-radius:16px; background:#fff; display:flex; flex-direction:column; min-height:0; }
  .card h2 { font-size:13px; margin:0; padding:14px 16px; border-bottom:1px solid var(--border);
    display:flex; align-items:center; gap:8px; font-weight:600; }
  .card h2 .count { color:var(--muted); font-weight:450; font-size:12px; }

  /* Segmented control */
  .seg { display:inline-flex; padding:3px; gap:2px; background:var(--subtle); border:1px solid var(--border);
    border-radius:10px; margin:14px 16px 0; align-self:flex-start; }
  .seg button { border:0; background:transparent; color:var(--muted); padding:6px 12px; border-radius:7px;
    font-size:12.5px; cursor:pointer; font-weight:520; }
  .seg button[aria-selected="true"] { background:#fff; color:var(--fg); box-shadow:0 1px 2px rgba(0,0,0,.06); }

  /* Chat */
  .chat { display:flex; flex-direction:column; height:560px; }
  .msgs { flex:1; overflow-y:auto; padding:16px; display:flex; flex-direction:column; gap:14px; }
  .empty { margin:auto; text-align:center; color:var(--muted); font-size:13px; max-width:300px; }
  .empty .ex { margin-top:12px; display:flex; flex-direction:column; gap:6px; }
  .empty .ex button { border:1px dashed var(--border); background:#fff; border-radius:8px; padding:7px 10px;
    font-size:12px; cursor:pointer; color:var(--fg); text-align:left; }
  .empty .ex button:hover { background:var(--subtle); }
  .row { display:flex; flex-direction:column; gap:5px; max-width:88%; }
  .row.user { align-self:flex-end; align-items:flex-end; }
  .row.assistant { align-self:flex-start; }
  .bubble { padding:10px 13px; border-radius:13px; white-space:pre-wrap; word-wrap:break-word; font-size:13.5px; }
  .user .bubble { background:var(--fg); color:#fff; border-bottom-right-radius:4px; }
  .assistant .bubble { background:var(--subtle); border:1px solid var(--border); border-bottom-left-radius:4px; }
  .meta { font-size:11px; color:var(--muted); display:flex; align-items:center; gap:6px; }
  .tag { border:1px solid var(--border); border-radius:999px; padding:1px 8px; font-size:10.5px; font-weight:550; background:#fff; }
  .tag.cloud { border-color:var(--fg); }
  .dots::after { content:"·"; animation:blink 1.2s steps(3,end) infinite; }
  @keyframes blink { 0%{content:"·"} 33%{content:"··"} 66%{content:"···"} }

  .composer { border-top:1px solid var(--border); padding:12px; display:flex; gap:8px; }
  .composer input { flex:1; border:1px solid var(--border); border-radius:10px; padding:10px 12px; font:inherit;
    background:#fff; outline:none; }
  .composer input:focus { border-color:var(--ring); box-shadow:0 0 0 3px rgba(24,24,27,.08); }
  .btn { border:1px solid var(--border); background:#fff; border-radius:10px; padding:9px 14px; font:inherit;
    font-weight:550; cursor:pointer; }
  .btn:hover { background:var(--subtle); }
  .btn-primary { background:var(--fg); color:#fff; border-color:var(--fg); }
  .btn-primary:hover { background:#000; }
  .btn:disabled { opacity:.5; cursor:not-allowed; }

  /* Backlog */
  .stats { display:grid; grid-template-columns:repeat(3,1fr); gap:8px; padding:14px 16px 4px; }
  .stat { border:1px solid var(--border); border-radius:11px; padding:10px 12px; }
  .stat .n { font-size:22px; font-weight:680; letter-spacing:-.02em; }
  .stat .l { font-size:10.5px; color:var(--muted); text-transform:uppercase; letter-spacing:.05em; }
  .backlog-list { flex:1; overflow-y:auto; padding:8px 16px; display:flex; flex-direction:column; gap:8px; min-height:120px; }
  .task { display:flex; gap:10px; align-items:flex-start; padding:9px 11px; border:1px solid var(--border); border-radius:10px; }
  .st { width:14px; height:14px; border-radius:999px; flex:none; margin-top:2px; border:1.5px solid var(--fg); }
  .st.queued { background:#fff; }
  .st.sending { background:var(--fg); animation:pulse 1s infinite; }
  .st.done { background:var(--fg); }
  .st.done::after { content:"✓"; color:#fff; font-size:9px; display:block; text-align:center; line-height:11px; }
  .st.error { background:#fff; border-style:dashed; }
  @keyframes pulse { 50%{opacity:.35} }
  .task .tp { font-size:12.5px; line-height:1.4; }
  .task .tr { font-size:11px; color:var(--muted); margin-top:2px; }
  .backlog-actions { border-top:1px solid var(--border); padding:11px 16px; display:flex; gap:8px; }
  .backlog-actions .btn { padding:7px 12px; font-size:12.5px; }
  .hint { color:var(--muted); font-size:11.5px; padding:0 16px 12px; }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="brand">
      <span class="mark">🛶</span>
      <span>Ferry <span class="sub">· local-first AI for flaky connections</span></span>
    </div>
    <div class="spacer"></div>
    <div class="conn">
      <span class="lbl" id="connLbl">Offline</span>
      <div class="switch" id="connSwitch" data-on="false" title="Toggle the connection window"><div class="knob"></div></div>
    </div>
  </header>

  <div class="banner">
    <div class="flow">
      <span class="chip">You</span><span class="arrow"></span>
      <span class="chip">Ferry</span><span class="arrow"></span>
      <span class="chip">on-device · gemma4:e2b</span>
      <span style="opacity:.5">or</span>
      <span class="chip">backlog</span><span class="arrow"></span>
      <span class="chip">Cerebras · gemma-4-31b</span>
    </div>
    <a class="how" href="/how" target="_blank">How it works ↗</a>
  </div>

  <div class="grid">
    <!-- Chat -->
    <div class="card">
      <div class="seg" id="seg">
        <button data-model="ferry" aria-selected="true">Auto</button>
        <button data-model="ferry-local" aria-selected="false">On-device</button>
        <button data-model="ferry-cloud" aria-selected="false">Cloud</button>
      </div>
      <div class="chat">
        <div class="msgs" id="msgs">
          <div class="empty" id="empty">
            Ask anything. Easy prompts answer instantly on-device; hard ones queue
            and stream back the moment the connection window opens.
            <div class="ex">
              <button onclick="example('What is 17 times 4?')">“What is 17 times 4?” → on-device</button>
              <button onclick="example('Write a detailed analysis comparing Raft and Paxos consensus.')">“Write a detailed analysis…” → queued → Cerebras</button>
            </div>
          </div>
        </div>
        <div class="composer">
          <input id="input" placeholder="Message Ferry…" autocomplete="off" />
          <button class="btn btn-primary" id="send">Send</button>
        </div>
      </div>
    </div>

    <!-- Backlog -->
    <div class="card">
      <h2>Backlog <span class="count" id="blCount"></span></h2>
      <div class="stats">
        <div class="stat"><div class="n" id="s-queued">0</div><div class="l">Queued</div></div>
        <div class="stat"><div class="n" id="s-sending">0</div><div class="l">Sending</div></div>
        <div class="stat"><div class="n" id="s-done">0</div><div class="l">Done</div></div>
      </div>
      <div class="backlog-list" id="backlog"></div>
      <div class="hint" id="modelHint"></div>
      <div class="backlog-actions">
        <button class="btn" onclick="seed()">＋ Seed 12</button>
        <button class="btn" onclick="clearAll()">Clear</button>
      </div>
    </div>
  </div>
</div>

<script>
const $ = (id) => document.getElementById(id);
const PLACEHOLDER_MARK = "⏳";
let model = "ferry";

// --- segmented control ---
$("seg").addEventListener("click", (e) => {
  const b = e.target.closest("button"); if (!b) return;
  [...$("seg").children].forEach(x => x.setAttribute("aria-selected", x === b));
  model = b.dataset.model;
});

// --- connection switch ---
$("connSwitch").addEventListener("click", async () => {
  const on = $("connSwitch").dataset.on === "true";
  await fetch("/demo/online/" + (on ? "false" : "true"), { method: "POST" });
  poll();
});

// --- chat ---
function example(t){ $("input").value = t; send(); }

function addRow(role){
  $("empty")?.remove();
  const row = document.createElement("div");
  row.className = "row " + role;
  const bubble = document.createElement("div");
  bubble.className = "bubble";
  row.appendChild(bubble);
  let meta;
  if (role === "assistant") {
    meta = document.createElement("div");
    meta.className = "meta";
    row.appendChild(meta);
  }
  $("msgs").appendChild(row);
  $("msgs").scrollTop = $("msgs").scrollHeight;
  return { bubble, meta };
}

async function send(){
  const text = $("input").value.trim();
  if (!text) return;
  $("input").value = "";
  addRow("user").bubble.textContent = text;

  const { bubble, meta } = addRow("assistant");
  meta.innerHTML = '<span class="dots">routing</span>';
  $("send").disabled = true;

  let content = "";
  let tagged = false;
  try {
    await streamChat([{ role: "user", content: text }], model, (delta) => {
      content += delta;
      if (!tagged) {
        tagged = true;
        const cloud = content.startsWith(PLACEHOLDER_MARK);
        meta.innerHTML = cloud
          ? '<span class="tag cloud">queued → Cerebras</span><span class="dots">waiting for window</span>'
          : '<span class="tag">on-device · gemma4:e2b</span>';
      }
      // Once the real cloud answer starts arriving, drop the "waiting" hint.
      if (content.startsWith(PLACEHOLDER_MARK) && content.length > 140) {
        const d = meta.querySelector(".dots"); if (d) d.remove();
      }
      bubble.textContent = content;
      $("msgs").scrollTop = $("msgs").scrollHeight;
    });
  } catch (e) {
    bubble.textContent = content || ("[error: " + e + "]");
  }
  const d = meta.querySelector(".dots"); if (d) d.remove();
  $("send").disabled = false;
  poll();
}

$("send").addEventListener("click", send);
$("input").addEventListener("keydown", (e) => { if (e.key === "Enter") send(); });

async function streamChat(messages, model, onDelta){
  const res = await fetch("/v1/chat/completions", {
    method: "POST", headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ model, stream: true, messages }),
  });
  const reader = res.body.getReader();
  const dec = new TextDecoder();
  let buf = "";
  while (true) {
    const { done, value } = await reader.read();
    if (done) break;
    buf += dec.decode(value, { stream: true });
    let i;
    while ((i = buf.indexOf("\n\n")) >= 0) {
      const block = buf.slice(0, i); buf = buf.slice(i + 2);
      for (const line of block.split("\n")) {
        if (!line.startsWith("data:")) continue;
        const data = line.slice(5).trim();
        if (data === "[DONE]") return;
        try {
          const o = JSON.parse(data);
          const delta = o.choices?.[0]?.delta?.content;
          if (delta) onDelta(delta);
        } catch (_) {}
      }
    }
  }
}

// --- backlog + status polling ---
async function seed(){ await fetch("/demo/seed?count=12", { method: "POST" }); poll(); }
async function clearAll(){ await fetch("/demo/clear", { method: "POST" }); $("backlog").innerHTML=""; poll(); }

function esc(x){ const d=document.createElement("div"); d.textContent=x??""; return d.innerHTML; }

async function poll(){
  try {
    const [s, t] = await Promise.all([
      fetch("/api/status").then(r => r.json()),
      fetch("/api/tasks?limit=40").then(r => r.json()),
    ]);
    const on = s.online;
    $("connSwitch").dataset.on = on;
    $("connLbl").textContent = on ? "Online" : "Offline";
    $("s-queued").textContent = s.counts.queued;
    $("s-sending").textContent = s.counts.sending;
    $("s-done").textContent = s.counts.done;
    $("blCount").textContent = `${s.counts.queued + s.counts.sending} open`;
    $("modelHint").textContent = `${s.keys} key(s) · ${s.local_model} → ${s.cloud_model} · router=${s.router_mode}`;
    $("backlog").innerHTML = t.length ? t.map(x => `
      <div class="task">
        <div class="st ${x.status}"></div>
        <div><div class="tp">${esc(x.prompt)}</div>
        <div class="tr">${esc(x.route || "")}</div></div>
      </div>`).join("") : `<div class="hint" style="padding:16px 0">Backlog empty. Seed some tasks or ask a hard question while offline.</div>`;
  } catch (_) {}
}

poll();
setInterval(poll, 1000);
</script>
</body>
</html>
